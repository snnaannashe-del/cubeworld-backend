services:
  - type: web
    name: cubeworld-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/cubeworld.db
    disk:
      name: cubeworld-data
      mountPath: /data
      sizeGB: 1
